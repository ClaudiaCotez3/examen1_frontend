<section class="login">
  <div class="login__card">
    <div class="login__header">
      <div class="login__logo">
        <lucide-icon name="workflow" class="login__logo-icon"></lucide-icon>
      </div>
      <h1 class="login__title">Iniciar sesión</h1>
      <p class="login__subtitle">Accede a la plataforma de gestión de flujos de trabajo</p>
    </div>

    @if (info()) {
      <div class="login__alert login__alert--info">
        <lucide-icon name="alert-circle"></lucide-icon>
        <span>{{ info() }}</span>
      </div>
    }

    @if (errorMessage()) {
      <div class="login__alert login__alert--error" role="alert">
        <lucide-icon name="alert-circle"></lucide-icon>
        <span>{{ errorMessage() }}</span>
      </div>
    }

    <form class="login__form" [formGroup]="form" (ngSubmit)="submit()">
      <label class="login__field">
        <span class="login__label">Correo</span>
        <input
          type="email"
          formControlName="email"
          placeholder="name@company.com"
          autocomplete="email"
          class="login__input"
          [disabled]="loading()"
        />
        @if (form.controls.email.touched && form.controls.email.invalid) {
          <span class="login__error">Enter a valid email</span>
        }
      </label>

      <label class="login__field">
        <span class="login__label">Contraseña</span>
        <input
          type="password"
          formControlName="password"
          placeholder="••••••••"
          autocomplete="current-password"
          class="login__input"
          [disabled]="loading()"
        />
        @if (form.controls.password.touched && form.controls.password.invalid) {
          <span class="login__error">Minimum 8 characters</span>
        }
      </label>

      <button
        type="submit"
        class="login__button"
        [disabled]="loading() || form.invalid"
      >
        @if (loading()) {
          <lucide-icon name="loader" class="login__spinner"></lucide-icon>
          <span>Iniciando sesión…</span>
        } @else {
          <span>Iniciar sesión</span>
        }
      </button>
    </form>
  </div>
</section>
