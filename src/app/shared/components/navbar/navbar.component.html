<header class="navbar">
  <button
    type="button"
    class="navbar__menu-btn"
    (click)="toggleSidebar()"
    [attr.aria-pressed]="sidebarOpen()"
    [title]="sidebarOpen() ? 'Ocultar menú lateral' : 'Mostrar menú lateral'"
  >
    <lucide-icon name="menu" [size]="18"></lucide-icon>
  </button>

  <div class="navbar__title">Workflow Management</div>

  <div class="navbar__actions">
    <button class="navbar__icon-btn" aria-label="Notifications">
      <lucide-icon name="bell"></lucide-icon>
    </button>

    <button class="navbar__icon-btn" aria-label="Settings">
      <lucide-icon name="settings"></lucide-icon>
    </button>

    @if (currentUser(); as user) {
      <div class="navbar__user">
        <lucide-icon name="user" class="navbar__user-avatar"></lucide-icon>
        <div class="navbar__user-meta">
          <span class="navbar__user-name">{{ user.fullName }}</span>
          @if (primaryRole()) {
            <span class="navbar__user-role">{{ primaryRole() }}</span>
          }
        </div>
      </div>

      <button
        class="navbar__logout"
        type="button"
        (click)="logout()"
        aria-label="Sign out"
        title="Sign out"
      >
        <lucide-icon name="log-out"></lucide-icon>
        <span>Salir</span>
      </button>
    }
  </div>
</header>
